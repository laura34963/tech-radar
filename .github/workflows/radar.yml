name: tech-radar
on:
  schedule:
    - cron: "0 22 * * 0"   # weekly — Sun 22:00 UTC ≈ Mon 06:00 Asia/Taipei
  workflow_dispatch:
concurrency:
  group: tech-radar
  cancel-in-progress: false
permissions:
  contents: write      # commit output/ back to main
  pages: write         # deploy to Pages
  id-token: write      # Pages OIDC
jobs:
  digest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: cp config/radar.example.toml config/radar.toml
      - run: python radar.py run
        env:
          RADAR_LLM_API_KEY: ${{ secrets.RADAR_LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit output
        run: |
          git config user.name "tech-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output
          git diff --cached --quiet || git commit -m "chore: weekly digest $(date -u +%F)"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deploy
        uses: actions/deploy-pages@v4

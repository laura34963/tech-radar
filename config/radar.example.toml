# NOTE: top-level `categories` MUST appear before the first [table] header,
# otherwise TOML nests it under the preceding table (e.g. [stack]).
categories = ["backend", "frontend", "devops", "cloud", "security"]

[general]
title = "Kdan Tech Radar"
timezone = "Asia/Taipei"
max_items_per_category = 15
lookback_days = 7
min_keep_importance = "medium"      # low | medium | high | critical
min_display_importance = "high"

[stack]
languages  = ["ruby", "go", "javascript", "python"]
frameworks = ["rails", "react"]
packages   = ["rails", "sidekiq", "react", "axios"]
ecosystems = ["rubygems", "npm", "pypi"]

[[sources]]
type = "cloud"
category = "cloud"
provider = "aws"
url = "https://aws.amazon.com/about-aws/whats-new/recent/feed/"
services = ["ec2", "s3", "lambda", "rds"]

[[sources]]
type = "cloud"
category = "cloud"
provider = "azure"
url = "https://azure.microsoft.com/en-us/updates/feed/"

[[sources]]
type = "github"
category = "backend"
repo = "rails/rails"

[[sources]]
type = "security"
category = "security"
feed = "osv"

[[sources]]
type = "security"           # GitHub Security Advisories; uses [stack].packages + ecosystems
category = "security"
feed = "ghsa"               # optional GITHUB_TOKEN raises the rate limit

# Threat intel & security news (verified 2026-07-22; plain RSS, no auth).
# NOTE: some security sites (e.g. BleepingComputer) sit behind Cloudflare and
# return 403 to any non-browser client — a UA header alone won't fetch them.
[[sources]]
type = "rss"
category = "security"
url = "https://www.cisa.gov/cybersecurity-advisories/all.xml"   # CISA advisories

[[sources]]
type = "rss"
category = "security"
url = "https://feeds.feedburner.com/TheHackersNews"   # The Hacker News

[[sources]]
type = "rss"
category = "security"
url = "https://isc.sans.edu/rssfeed_full.xml"         # SANS Internet Storm Center

[[sources]]
type = "rss"
category = "security"
url = "https://krebsonsecurity.com/feed/"             # Krebs on Security

[[sources]]
type = "rss"
category = "security"
url = "https://unit42.paloaltonetworks.com/feed/"     # Palo Alto Unit 42

[[sources]]
type = "rss"
category = "security"
url = "https://blog.talosintelligence.com/rss/"       # Cisco Talos

[[sources]]
type = "rss"
category = "security"
url = "https://thedfirreport.com/feed/"               # The DFIR Report

[[sources]]
type = "social"
category = "security"
source = "reddit"
subreddit = "netsec"
min_points = 50

[[sources]]
type = "social"
category = "frontend"
source = "hn"
query = "react OR frontend"
min_points = 100

[[sources]]
type = "social"
category = "frontend"
source = "reddit"
subreddit = "reactjs"
query = ""                  # optional; empty -> newest posts, set -> search within the subreddit
min_points = 50

[[sources]]
type = "registry"           # package-registry release news; complements github releases
category = "frontend"
registry = "npm"            # npm | pypi | rubygems
packages = ["react", "axios"]

[[sources]]
type = "registry"
category = "backend"
registry = "rubygems"
packages = ["rails", "sidekiq"]

[llm]
enabled = true
provider = "openai_compatible"       # openai_compatible | anthropic | gemini | ollama | cli
base_url = "https://api.openai.com/v1"
model = "gpt-4o-mini"
api_key_env = "RADAR_LLM_API_KEY"
max_items_to_enrich = 40
# Gemini example:
#   provider = "gemini"
#   base_url = "https://generativelanguage.googleapis.com"   # optional; this is the default
#   model = "gemini-2.5-flash"
#   api_key_env = "RADAR_LLM_API_KEY"
# CLI example (route through a locally-authenticated LLM CLI; no API key needed).
# The prompt is piped on stdin; use a {prompt} token if the CLI takes it as an arg.
#   provider = "cli"
#   command = "claude -p"                    # or: "gemini -m gemini-2.5-flash"
#   command_timeout = 120                    # seconds (optional)
